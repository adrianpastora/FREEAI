services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: freeai
      POSTGRES_PASSWORD: freeai
      POSTGRES_DB: freeai
    volumes:
      - freeai_pg:/var/lib/postgresql/data
    ports:
      - "5444:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freeai -d freeai"]
      interval: 5s
      timeout: 3s
      retries: 10

  freeai:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FREEAI_DATABASE_URL: postgresql+asyncpg://freeai:freeai@postgres:5432/freeai
      FREEAI_AUTO_MIGRATE: "true"
      FREEAI_LOG_LEVEL: INFO
      FREEAI_LOG_FORMAT: json
      FREEAI_CORS_ORIGINS: "${FREEAI_CORS_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}"
      FREEAI_MASTER_KEY: ${FREEAI_MASTER_KEY:-}
      FREEAI_ADMIN_TOKEN: ${FREEAI_ADMIN_TOKEN:-}
    volumes:
      - freeai_data:/app/backend/data
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    profiles: ["observability"]
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - freeai_prom:/prometheus
    depends_on:
      - freeai
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana:11.2.2
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - freeai_grafana:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  freeai_pg:
  freeai_data:
  freeai_prom:
  freeai_grafana:
