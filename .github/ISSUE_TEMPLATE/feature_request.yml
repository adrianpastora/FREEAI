name: Feature request
description: Suggest a new capability or non-trivial change
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please open this before writing a PR for anything bigger than a small
        fix — it takes 5 minutes and avoids wasted work. See
        [CONTRIBUTING.md](../../CONTRIBUTING.md) for what's likely and
        unlikely to be merged.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the concrete use case. "Wouldn't it be nice if..." is OK but a real scenario is better.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: If you already have an idea of what the implementation looks like, sketch it here. Otherwise, leave blank and we'll discuss.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      description: Especially interesting when you've already tried something that didn't fit.

  - type: checkboxes
    id: acks
    attributes:
      label: Before submitting
      options:
        - label: I've read [docs/REVIEW.md § 3](../../docs/REVIEW.md) (design decisions worth preserving) and my proposal doesn't contradict a load-bearing decision, or it does and I've explained why.
          required: true
